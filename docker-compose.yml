# Productie op de OVH-VM, ingepast in het bestaande patroon (gedeelde Caddy op
# netwerk `web`). Eigen compose-project radiowaver-prod met:
#   icecast   - de streamingserver (poort 8000 voor de bron)
#   api       - FastAPI-beheer (mededeling, agenda, partners) + uploads
#   keycloak  - eigen Keycloak (login voor het beheer), realm-import
#   web       - Caddy: statische speler + routing naar api/keycloak/uploads
#
# De gedeelde Caddy routeert radio.waver.be -> radiowaver-web-prod:80.
# Lokaal testen: docker-compose.dev.yml.
name: radiowaver-prod

services:
  icecast:
    build: ./icecast
    container_name: radiowaver-icecast-prod
    restart: unless-stopped
    env_file: .env
    networks: [internal]
    ports:
      - "8000:8000"   # bron levert hier rechtstreeks aan (BUTT)

  api:
    build: ./backend
    container_name: radiowaver-api-prod
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
    volumes:
      - data:/data
    networks: [internal]

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    container_name: radiowaver-keycloak-prod
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${PUBLIC_URL}/auth
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - kcdata:/opt/keycloak/data
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    networks: [internal]

  web:
    image: caddy:2-alpine
    container_name: radiowaver-web-prod
    restart: unless-stopped
    depends_on: [icecast, api, keycloak]
    networks: [web, internal]
    volumes:
      - ./Caddyfile.web:/etc/caddy/Caddyfile:ro
      - ./web:/srv/web:ro
      - data:/srv/data:ro          # geüploade logo's/affiches (read-only serveren)

networks:
  web:
    external: true                  # gedeeld proxy-netwerk (van JEKA/daak)
  internal:
    name: radiowaver-internal

volumes:
  data:                             # SQLite-db + uploads
  kcdata:                           # Keycloak-data (H2 + realm)
