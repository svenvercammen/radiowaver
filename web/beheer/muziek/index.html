<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radio Waver — Muziek (autoplay)</title>
<link rel="icon" href="/assets/logo.png"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style>body{font-family:'Work Sans',system-ui,sans-serif}</style>
</head>
<body class="bg-[#fcf9f8] text-[#1c1b1b] min-h-screen">
<div id="loading" class="min-h-screen flex items-center justify-center text-[#717978]">Bezig met inloggen…</div>

<div id="app" class="hidden max-w-3xl mx-auto px-4 py-8 space-y-8">
  <header class="flex items-center justify-between border-b border-[#c0c8c8] pb-4">
    <div class="flex items-center gap-3">
      <img src="/assets/logo.png" class="h-10 w-auto" alt="Radio Waver"/>
      <div>
        <h1 class="text-2xl font-bold text-[#002627]">Muziek — autoplay</h1>
        <a href="/beheer/" class="text-sm text-[#b51c0d] font-semibold hover:underline">← terug naar beheer</a>
      </div>
    </div>
    <div class="text-right">
      <p id="user" class="text-sm text-[#404848]"></p>
      <button id="logout" class="text-sm text-[#b51c0d] font-semibold hover:underline">Afmelden</button>
    </div>
  </header>

  <p class="text-sm text-[#404848] bg-[#f0eded] rounded p-3">
    Wanneer er geen live uitzending is, speelt de radio deze MP3's automatisch af —
    in deze volgorde, in een oneindige lus. Versleep om de volgorde te wijzigen.
  </p>

  <p id="msg" class="hidden rounded px-4 py-2 text-sm"></p>

  <section class="bg-white border border-[#c0c8c8] rounded-lg p-4 flex items-center justify-between">
    <label class="flex items-center gap-3">
      <input type="checkbox" id="music-enabled" class="w-5 h-5"/>
      <span>Autoplay-muziek inschakelen (uit = stilte wanneer er geen live is)</span>
    </label>
    <button data-save="settings" class="bg-[#002627] text-white px-4 py-2 rounded font-semibold hover:bg-[#0f3d3e] shrink-0">Opslaan</button>
  </section>

  <section class="bg-white border border-[#c0c8c8] rounded-lg p-6 space-y-3">
    <h2 class="text-lg font-bold text-[#002627]">MP3 toevoegen</h2>
    <form id="upload-form" class="grid sm:grid-cols-[1fr_auto] gap-3 items-end">
      <div class="space-y-2">
        <input id="track-name" placeholder="Titel (optioneel, anders bestandsnaam)" class="w-full border border-[#c0c8c8] rounded p-2"/>
        <input id="track-file" type="file" accept="audio/mpeg,.mp3" required class="block w-full"/>
      </div>
      <button id="upload-btn" class="bg-[#b51c0d] text-white px-5 py-2 rounded font-semibold hover:bg-[#d93724] h-fit">Uploaden</button>
    </form>
    <p id="upload-status" class="text-sm text-[#717978]"></p>
  </section>

  <section class="space-y-3">
    <h2 class="text-lg font-bold text-[#002627]">Afspeellijst (versleep om te ordenen)</h2>
    <div id="list" class="space-y-2"></div>
  </section>
</div>

<script type="module">
import Keycloak from "https://cdn.jsdelivr.net/npm/keycloak-js@26.2.4/+esm";
(function(){
  var kc = new Keycloak({ url: location.origin + "/auth", realm: "radiowaver", clientId: "radiowaver-beheer" });
  var sortable = null;

  kc.init({ onLoad: "login-required", pkceMethod: "S256" }).then(function(authed){
    if(!authed){ location.reload(); return; }
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("user").textContent = (kc.tokenParsed && (kc.tokenParsed.preferred_username || kc.tokenParsed.name)) || "";
    start();
  }).catch(function(){ document.getElementById("loading").textContent = "Inloggen mislukt."; });

  document.getElementById("logout").addEventListener("click", function(){ kc.logout(); });

  function msg(text, ok){
    var el = document.getElementById("msg");
    el.textContent = text;
    el.className = "rounded px-4 py-2 text-sm " + (ok ? "bg-green-100 text-green-800" : "bg-red-100 text-red-800");
  }
  function esc(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

  function token(){ return kc.updateToken(30).catch(function(){}).then(function(){ return kc.token; }); }
  function api(method, path, body){
    return token().then(function(t){
      var opts = { method: method, headers: { "Authorization": "Bearer " + t } };
      if(body){ opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
      return fetch(path, opts).then(function(r){
        if(!r.ok){ return r.text().then(function(x){ throw new Error(x || r.status); }); }
        return r.status === 204 ? null : r.json();
      });
    });
  }

  function start(){
    load();

    document.querySelector('[data-save="settings"]').addEventListener("click", function(){
      api("PUT", "/api/admin/tracks/settings", { enabled: document.getElementById("music-enabled").checked })
        .then(function(){ msg("Opgeslagen.", true); }).catch(function(e){ msg("Fout: " + e.message, false); });
    });

    document.getElementById("upload-form").addEventListener("submit", function(e){
      e.preventDefault();
      var fileInput = document.getElementById("track-file");
      if(!fileInput.files.length) return;
      var fd = new FormData();
      fd.append("name", document.getElementById("track-name").value);
      fd.append("file", fileInput.files[0]);
      document.getElementById("upload-btn").disabled = true;
      document.getElementById("upload-status").textContent = "Uploaden…";
      token().then(function(t){
        return fetch("/api/admin/tracks", { method: "POST", headers: { "Authorization": "Bearer " + t }, body: fd });
      }).then(function(r){ if(!r.ok) return r.text().then(function(x){ throw new Error(x); }); return r.json(); })
        .then(function(){
          e.target.reset();
          document.getElementById("upload-status").textContent = "";
          load(); msg("MP3 toegevoegd.", true);
        })
        .catch(function(err){ document.getElementById("upload-status").textContent = ""; msg("Fout: " + err.message, false); })
        .finally(function(){ document.getElementById("upload-btn").disabled = false; });
    });
  }

  function load(){
    api("GET", "/api/admin/tracks").then(function(d){
      document.getElementById("music-enabled").checked = !!d.enabled;
      var list = document.getElementById("list");
      list.innerHTML = "";
      if(!d.items.length){ list.innerHTML = '<p class="text-sm text-[#717978]">Nog geen nummers.</p>'; return; }
      d.items.forEach(function(t){
        var div = document.createElement("div");
        div.className = "flex items-center gap-3 rounded p-2 border border-[#c0c8c8] bg-white";
        div.dataset.id = t.id;
        div.innerHTML =
          '<span class="material-symbols-outlined text-[#717978] cursor-grab select-none drag" title="Versleep">drag_indicator</span>' +
          '<span class="flex-grow">' + esc(t.name || "(naamloos)") + '</span>' +
          '<button data-act="rename" class="text-[#002627] font-semibold text-sm hover:underline">Naam</button>' +
          '<button data-act="del" class="text-[#b51c0d] font-semibold text-sm hover:underline">Verwijderen</button>';
        div.querySelector('[data-act="rename"]').addEventListener("click", function(){
          var name = prompt("Nieuwe titel:", t.name || "");
          if(name !== null) api("PUT", "/api/admin/tracks/" + t.id, { name: name }).then(load);
        });
        div.querySelector('[data-act="del"]').addEventListener("click", function(){
          if(confirm("Nummer verwijderen?")) api("DELETE", "/api/admin/tracks/" + t.id).then(load);
        });
        list.appendChild(div);
      });
      if(sortable) sortable.destroy();
      sortable = Sortable.create(list, {
        handle: ".drag", animation: 150,
        onEnd: function(){
          var ids = Array.from(list.children).map(function(el){ return parseInt(el.dataset.id, 10); }).filter(Boolean);
          api("PUT", "/api/admin/tracks/order", { ids: ids }).then(function(){ msg("Volgorde opgeslagen.", true); });
        }
      });
    });
  }
})();
</script>
</body>
</html>
